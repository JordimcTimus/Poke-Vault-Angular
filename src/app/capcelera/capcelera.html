<header>
  <!-- IZQUIERDA -->
  <div class="header-left">
    <a routerLink="/index">
      <img class="logo" ngSrc="/assets/Logo.png" alt="Logo" height="50" width="50">
    </a>
    <p class="site-name">PokéValue</p>
  </div>

  <!-- DERECHA -->
  <div class="header-right">
    <p class="usuario-logueado">{{ auth.loggedInUser?.nom }}</p>
    <p class="logout" *ngIf="auth.loggedInUser" (click)="logout()">Salir</p>
    @if (auth.loggedInUser) {
      <a>
        <img ngSrc="assets/Login_Icon.jpg" height="50" width="50" (click)="obrirPerfil('NO FUNCIONAAAAAA')">
      </a>
    }
    @else {
      <a routerLink="/login">
        <img ngSrc="assets/Login_Icon.jpg" height="50" width="50">
      </a>
    }
    <a routerLink="/cistella">
      <img ngSrc="assets/compra.webp" height="50" width="50">
    </a>
  </div>
</header>

<nav>
  <a routerLink="" class="first-link">
    <img ngSrc="assets/Poké_Ball.png" alt="Poké Ball" height="50" width="50"/>
    POKE OFERTES
  </a>
  <a routerLink="/catalegCartas" class="first-link">
    <img ngSrc="/assets/cards.webp" alt="Poké Ball" height="50" width="50"/>
    CARTES POKEMON
  </a>
  <!-- POKEMON ALEATORIO - Click para recargar -->
  <a routerLink="" class="first-link">
    <img [src]="imagenPokemon" height="50" width="50" alt="Pokémon">
    {{ nombrePokemon }}
  </a>
  <a routerLink="" class="first-link">
    <img ngSrc="/assets/novedad.webp" alt="Poké Ball" height="50" width="50"/>
    GENERACIONS
  </a>
  <a routerLink="" class="first-link">
    <img ngSrc="/assets/pokebag.webp" alt="Poké Ball" height="50" width="50"/>
    RESERVES
  </a>
</nav>
