<header>
  <!-- IZQUIERDA -->
  <div class="header-left">
    <a routerLink="/index">
      <img class="logo" ngSrc="/assets/Logo.png" alt="Logo" height="50" width="50">
    </a>
    <p class="site-name">PokéValue</p>
  </div>

  <!-- DERECHA -->
  <div class="header-right">
    <p class="usuario-logueado">{{ auth.loggedInUser?.nom }}</p>
    <p class="logout" *ngIf="auth.loggedInUser" (click)="logout()">Salir</p>
    <a routerLink="/login">
      <img ngSrc="assets/Login_Icon.jpg" height="50" width="50">
    </a>
    <a routerLink="/cistella">
      <img ngSrc="assets/compra.webp" height="50" width="50">
    </a>
  </div>
</header>
