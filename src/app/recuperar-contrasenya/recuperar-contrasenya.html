<body>
<div class="container">
  <form (ngSubmit)="onSubmit()">
    <p>Nova contrasenya</p>

    <p *ngIf="success" style="color: #4CAF50; font-size: 1rem;">
      {{ message }}<br>Redirigint al login...
    </p>

    <p *ngIf="error" style="color: #ff4444; font-size: 1rem;">{{ error }}</p>

    <div *ngIf="!success">
      <input type="password" [(ngModel)]="password" name="password" placeholder="Nova contrasenya" required><br>
      <input type="password" [(ngModel)]="confirm" name="confirm" placeholder="Confirma la contrasenya" required><br>
      <button type="submit">Canviar contrasenya</button>
    </div>
    <a routerLink=""> Tornar a la pagina principal </a> <br>

  </form>
</div>
</body>
