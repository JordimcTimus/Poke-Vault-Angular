<body>
<div class="container">
  <form (ngSubmit)="onSubmit()">
    <p>Has oblidat la contrasenya?</p>

    <p *ngIf="message" style="color: #4CAF50; font-size: 1rem;">{{ message }}</p>

    <div *ngIf="!message">
      <input type="email" [(ngModel)]="email" name="email" placeholder="El teu correu" required><br>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Enviant' : 'Enviar enllaç' }}
      </button><br>
      <a routerLink="/login"> Tornar al login</a>
    </div>
  </form>
</div>
</body>
