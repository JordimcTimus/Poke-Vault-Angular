
<div class="container">
  <form #loginForm="ngForm" (ngSubmit)="login()">
    <p> Benvingut </p>
    <input type="email" placeholder="Email"><br>
    <input type="password" placeholder="Contrasenya"><br>
    <input type="button" value="Inici sessió"><br>
    <a routerLink="/app/sign-up/sign-up.html"> Encara no tens compte? </a> <br> <br>
    <a routerLink="/app/app.html"> Tornar a la pagina principal </a>

    <input type="email" name="email" [(ngModel)]="email" placeholder="Email" required><br>
    <input type="password" name="password" [(ngModel)]="password" placeholder="Contrasenya" required><br>

    <button type="submit">Entrar</button>

    <a routerLink="app/sign-up/sign-up.html"> Encara no tens compte? </a> <br> <br>
    <a routerLink="app/app.html"> Tornar a la pagina principal </a>
    <a routerLink="/sign-up">Registrar-se</a>
  </form>
</div>
