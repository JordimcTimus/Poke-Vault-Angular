<body>
<div class="container">
  <form (ngSubmit)="login()">
    <p> Benvingut </p>

    <input type="email" name="email" [(ngModel)]="email" placeholder="Email" required><br>
    <input type="password" name="password" [(ngModel)]="password" placeholder="Contrasenya" required><br>

    <button type="submit">Entrar</button> <br>

    <a routerLink=""> Tornar a la pagina principal </a> <br>
    <a routerLink="/sign-up">Registrar-se</a> <br>
    <a routerLink="/forgot-password">Has oblidat la contrasenya?</a>
  </form>
</div>
</body>
